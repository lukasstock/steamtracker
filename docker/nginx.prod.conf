server {
    listen 80;
    server_name steamgametracker.com www.steamgametracker.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name steamgametracker.com www.steamgametracker.com;
    root /var/www/html/public;

    ssl_certificate /etc/letsencrypt/live/steamgametracker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/steamgametracker.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
