services:
  mysql:
    image: mysql:8.0
    container_name: steamtracker_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: steamtracker
      MYSQL_USER: steamtracker
      MYSQL_PASSWORD: steamtracker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  php:
    build: .
    container_name: steamtracker_php
    volumes:
      - .:/var/www/html
    environment:
      DATABASE_URL: "mysql://steamtracker:steamtracker@mysql:3306/steamtracker?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: steamtracker_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:
